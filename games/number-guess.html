<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="game:title" content="숫자 맞추기" />
  <meta name="game:min-players" content="2" />
  <meta name="game:max-players" content="8" />
  <meta name="game:description" content="1~100 중 고른 숫자가 정답에서 가장 먼 사람이 패배" />
  <meta name="game:compare" content="max" />
  <meta name="game:mode" content="separated" />

  <title>숫자 맞추기</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 100%);
      color: #e2e8f0; user-select: none; -webkit-user-select: none; }
    #root { display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; padding: 1rem; gap: 1rem; }
    .status { font-size: 0.8rem; opacity: 0.55; letter-spacing: 0.05em; text-transform: uppercase; }
    .title { font-size: 1.3rem; font-weight: 700; opacity: 0.9; }
    .hint { font-size: 0.9rem; opacity: 0.7; max-width: 28rem; text-align: center; line-height: 1.4; }
    .timer { position: absolute; top: 0.75rem; right: 1rem; font-variant-numeric: tabular-nums;
      font-size: 0.85rem; opacity: 0.6; }
    .timer.warn { color: #f59e0b; opacity: 1; }
    .timer.danger { color: #f43f5e; opacity: 1; animation: pulse 0.5s infinite; }

    .countdown { font-size: 8rem; font-weight: 900; line-height: 1;
      color: #f59e0b; text-shadow: 0 0 40px rgba(245, 158, 11, 0.5);
      animation: pop 0.8s ease-out; }
    .go { color: #22c55e; text-shadow: 0 0 60px rgba(34, 197, 94, 0.7); }

    .picker { display: flex; flex-direction: column; align-items: center; gap: 1.25rem; width: 100%; max-width: 26rem; }
    .num-display { font-size: 5rem; font-weight: 900; font-variant-numeric: tabular-nums;
      color: #22c55e; text-shadow: 0 0 30px rgba(34, 197, 94, 0.4);
      min-width: 9rem; text-align: center; }
    .slider { width: 100%; height: 2.5rem; -webkit-appearance: none; appearance: none;
      background: linear-gradient(90deg, #1e293b, #334155); border-radius: 9999px; outline: none; }
    .slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none;
      width: 2.5rem; height: 2.5rem; border-radius: 50%; background: #22c55e;
      cursor: grab; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2); }
    .slider::-moz-range-thumb { width: 2.5rem; height: 2.5rem; border-radius: 50%;
      background: #22c55e; cursor: grab; border: none; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.2); }
    .range-labels { display: flex; justify-content: space-between; width: 100%;
      font-size: 0.75rem; opacity: 0.5; font-variant-numeric: tabular-nums; }

    .action { padding: 1rem 2.5rem; font-size: 1.1rem; border-radius: 0.75rem;
      border: none; cursor: pointer; background: #22c55e; color: #0f172a;
      font-weight: 800; letter-spacing: 0.05em; transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 4px 0 #16a34a; }
    .action:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 #16a34a; }
    .action:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

    .waiting { font-size: 1.1rem; opacity: 0.7; }
    .spinner { display: inline-block; width: 1rem; height: 1rem; border: 2px solid #334155;
      border-top-color: #22c55e; border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: -2px; margin-right: 0.5rem; }

    .result-icon { font-size: 6rem; line-height: 1; animation: pop 0.5s ease-out; }
    .result-text { font-size: 1.8rem; font-weight: 800; letter-spacing: 0.05em; }
    .loser-text { color: #f43f5e; }
    .winner-text { color: #22c55e; }
    .reveal { font-size: 1rem; opacity: 0.7; margin-top: 0.5rem; }
    .reveal b { color: #f59e0b; font-size: 1.3rem; }

    .hidden { display: none !important; }

    @keyframes pop { 0% { transform: scale(0.5); opacity: 0; }
      60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes shake { 0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    .shake { animation: shake 0.4s; }
  </style>
</head>
<body>
  <div class="timer hidden" id="timer">60</div>
  <div id="root">
    <div class="status" id="status">loading…</div>
    <div id="stage"></div>
  </div>

  <script>
    const GameSDK = (() => {
      let me = null, players = [], sessionId = null, seed = null, submitted = false;
      const handlers = { init: null, start: null, outcome: null };
      const send = (msg) => window.parent.postMessage(msg, '*');
      window.addEventListener('message', (e) => {
        const msg = e.data;
        if (!msg || !msg.type) return;
        if (msg.type === 'init') {
          me = msg.playerId; players = msg.players; sessionId = msg.sessionId; seed = msg.seed;
          handlers.init?.({ me, players, sessionId, seed });
          send({ type: 'ready' });
        } else if (msg.type === 'start') handlers.start?.();
        else if (msg.type === 'outcome') handlers.outcome?.({ loserId: msg.loserId, results: msg.results });
      });
      return {
        on: (t, fn) => handlers[t] = fn,
        submit: (value) => {
          if (submitted) return;
          if (typeof value !== 'number' || Number.isNaN(value)) return;
          submitted = true;
          send({ type: 'submit', value });
        },
        prng: () => {
          let a = 0;
          if (seed) for (let i = 0; i < seed.length; i++) a = (a * 31 + seed.charCodeAt(i)) | 0;
          else a = Date.now() | 0;
          return () => {
            a |= 0; a = (a + 0x6D2B79F5) | 0;
            let t = Math.imul(a ^ (a >>> 15), 1 | a);
            t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        },
        state: () => ({ me, players, sessionId, seed }),
      };
    })();

    const statusEl = document.getElementById('status');
    const stageEl = document.getElementById('stage');
    const timerEl = document.getElementById('timer');

    let target = null;
    let myGuess = 50;
    let timerHandle = null;
    let deadline = null;

    function startTimer() {
      timerEl.classList.remove('hidden');
      deadline = Date.now() + 60_000;
      const tick = () => {
        const left = Math.max(0, Math.ceil((deadline - Date.now()) / 1000));
        timerEl.textContent = `${left}s`;
        timerEl.classList.toggle('warn', left <= 15 && left > 5);
        timerEl.classList.toggle('danger', left <= 5);
        if (left <= 0) {
          clearInterval(timerHandle);
          autoSubmit();
        }
      };
      tick();
      timerHandle = setInterval(tick, 200);
    }

    function stopTimer() {
      if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
    }

    function autoSubmit() {
      const distance = Math.abs(myGuess - target);
      renderWaiting(distance, true);
      GameSDK.submit(distance);
    }

    function renderPicker() {
      stageEl.innerHTML = `
        <div class="picker">
          <div class="hint">정답은 <b>1~100</b> 사이 숨겨진 숫자. 가장 가까이 고른 사람이 <b>생존</b>, 가장 먼 사람이 <b>패배</b>.</div>
          <div class="num-display" id="disp">50</div>
          <input id="slider" class="slider" type="range" min="1" max="100" value="50" />
          <div class="range-labels"><span>1</span><span>100</span></div>
          <button class="action" id="go">제출</button>
        </div>`;
      const disp = document.getElementById('disp');
      const slider = document.getElementById('slider');
      slider.addEventListener('input', () => {
        myGuess = Number(slider.value);
        disp.textContent = myGuess;
      });
      document.getElementById('go').addEventListener('click', () => {
        const distance = Math.abs(myGuess - target);
        renderWaiting(distance, false);
        GameSDK.submit(distance);
      });
    }

    function renderWaiting(distance, auto) {
      stopTimer();
      timerEl.classList.add('hidden');
      statusEl.textContent = auto ? 'time up — 자동 제출됨' : 'submitted';
      stageEl.innerHTML = `
        <div class="waiting"><span class="spinner"></span>${auto ? '시간 초과! ' : ''}내 숫자 <b>${myGuess}</b> · 다른 플레이어 대기 중…</div>
      `;
    }

    function renderCountdown(n, cb) {
      stageEl.innerHTML = `<div class="countdown ${n === 'GO!' ? 'go' : ''}">${n}</div>`;
      setTimeout(cb, 700);
    }

    GameSDK.on('init', ({ me, players }) => {
      statusEl.textContent = `player ${me} · ${players.length}명 참가`;
      const rand = GameSDK.prng();
      target = Math.floor(rand() * 100) + 1;
      stageEl.innerHTML = `<div class="hint">곧 시작합니다…</div>`;
    });

    GameSDK.on('start', () => {
      statusEl.textContent = 'round start';
      let i = 3;
      const step = () => {
        if (i > 0) { renderCountdown(String(i--), step); }
        else { renderCountdown('GO!', () => { renderPicker(); startTimer(); }); }
      };
      step();
    });

    GameSDK.on('outcome', ({ loserId, results }) => {
      stopTimer();
      timerEl.classList.add('hidden');
      const { me } = GameSDK.state();
      const iLost = me === loserId;
      const myResult = results.find(r => r.playerId === me);
      statusEl.textContent = 'round over';
      stageEl.innerHTML = `
        <div class="result-icon">${iLost ? '💀' : '🎉'}</div>
        <div class="result-text ${iLost ? 'loser-text' : 'winner-text'}">
          ${iLost ? 'YOU LOSE' : 'SAFE'}
        </div>
        <div class="reveal">정답은 <b>${target}</b> · 내 숫자 ${myGuess} (거리 ${myResult ? myResult.value : '?'})</div>
      `;
      if (iLost) document.getElementById('root').classList.add('shake');
    });

    // standalone fallback: iframe 부모가 없으면 자체 시뮬레이션
    if (window.parent === window) {
      const fakeSeed = Math.random().toString(36).slice(2, 10);
      const fakePlayers = [
        { id: 'p1', name: '나' }, { id: 'p2', name: 'bot2' },
        { id: 'p3', name: 'bot3' }, { id: 'p4', name: 'bot4' },
      ];
      setTimeout(() => {
        window.postMessage({ type: 'init', playerId: 'p1', players: fakePlayers, sessionId: 'local', seed: fakeSeed }, '*');
        setTimeout(() => window.postMessage({ type: 'start' }, '*'), 300);
      }, 50);
      window.addEventListener('message', (e) => {
        if (e.data?.type === 'submit') {
          const mine = e.data.value;
          const results = [{ playerId: 'p1', value: mine }];
          for (let i = 2; i <= 4; i++) results.push({ playerId: `p${i}`, value: Math.floor(Math.random() * 100) });
          const loser = results.reduce((a, b) => a.value >= b.value ? a : b);
          setTimeout(() => window.postMessage({ type: 'outcome', loserId: loser.playerId, results }, '*'), 800);
        }
      });
    }
  </script>
</body>
</html>
