const GameSDK = (() => {
  let me = null, players = [], sessionId = null, seed = null;
  const submitted = new Set();
  const handlers = { init: null, start: null, outcome: null };
  function send(msg) { window.parent.postMessage(msg, '*'); }
  function on(type, fn) { handlers[type] = fn; }
  window.addEventListener('message', (e) => {
    const msg = e.data;
    if (!msg || !msg.type) return;
    if (msg.type === 'init') { me = msg.me; players = msg.players; sessionId = msg.sessionId; seed = msg.seed; handlers.init?.({ me, players, sessionId, seed }); }
    else if (msg.type === 'start') { handlers.start?.(); }
    else if (msg.type === 'outcome') { handlers.outcome?.({ loserId: msg.loserId, results: msg.results }); }
  });
  function submit(playerId, value) {
    if (submitted.has(playerId)) return;
    if (typeof value !== 'number' || Number.isNaN(value)) return;
    submitted.add(playerId); send({ type: 'submit', playerId, value });
  }
  function prng(s) {
    let a = 0; const str = s || seed || String(Date.now());
    for (let i = 0; i < str.length; i++) a = (a * 31 + str.charCodeAt(i)) | 0;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  return { on, submit, prng, state: () => ({ me, players, sessionId, seed }) };
})();

    body: (c) => `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><ellipse cx="30" cy="38" rx="17" ry="16" fill="${c}"/><circle cx="30" cy="22" r="13" fill="${c}"/><circle cx="18" cy="13" r="6" fill="${c}"/><circle cx="42" cy="13" r="6" fill="${c}"/><circle cx="18" cy="13" r="3.5" fill="#a16207"/><circle cx="42" cy="13" r="3.5" fill="#a16207"/><ellipse cx="25" cy="21" rx="3" ry="3" fill="#1a1a2e"/><ellipse cx="35" cy="21" rx="3" ry="3" fill="#1a1a2e"/><ellipse cx="26" cy="20" rx="1" ry="1" fill="white"/><ellipse cx="36" cy="20" rx="1" ry="1" fill="white"/><ellipse cx="30" cy="27" rx="3" ry="2.5" fill="#a16207"/><ellipse cx="22" cy="54" rx="6" ry="3.5" fill="${c}"/><ellipse cx="38" cy="54" rx="6" ry="3.5" fill="${c}"/></svg>` },
];

let playerCount = 0, gamePlayers = [], rand = null;
let runners = [];
const FINISH_LINE = 85;
const RACE_DURATION = 20000;
const BASE_SPEED = 4.1;

let platformConnected = false;

GameSDK.on('init', ({ players, seed }) => {
  platformConnected = true;
  gamePlayers = players;
  playerCount = players.length;
  rand = GameSDK.prng(seed);
  document.getElementById('waitingMsg').textContent = `${players.length}명 준비 완료 — 호스트 시작 대기 중…`;
});

GameSDK.on('start', () => {
  document.getElementById('waiting').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  setupRace();
  runCountdown(() => startRace());
});

// 테스트 모드 (플랫폼 미연결)
setTimeout(() => {
  if (platformConnected) return;
  document.getElementById('waitingMsg').textContent = '플랫폼 미연결 — 테스트 모드';
  const testModeEl = document.getElementById('testMode');
  testModeEl.style.display = 'block';
  const selectEl = document.getElementById('playerSelect');
  const startBtnEl = document.getElementById('startBtn');
  let sel = 0;
  for (let i = 2; i <= 8; i++) {
    const btn = document.createElement('button');
    btn.className = 'player-btn'; btn.textContent = i;
    btn.onclick = () => {
      selectEl.querySelectorAll('.player-btn').forEach(b => { b.style.borderColor='#334155'; b.style.background='#1e293b'; });
      btn.style.borderColor='#4ade80'; btn.style.background='#14352a'; sel = i; startBtnEl.style.display='block';
    };
    selectEl.appendChild(btn);
  }
  startBtnEl.onclick = () => {
    if (sel < 2) return;
    const names = ['강명훈','이서연','박찬영','김태호','정수빈','최유진','한도윤','윤지아'];
    gamePlayers = []; for (let i = 0; i < sel; i++) gamePlayers.push({ id:`p${i+1}`, name: names[i] });
    playerCount = sel; rand = GameSDK.prng(String(Date.now()));
    document.getElementById('waiting').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    setupRace(); runCountdown(() => startRace());
  };
}, 2000);

function setupRace() {
  const lanesEl = document.getElementById('lanes');
  lanesEl.innerHTML = '';
  runners = [];

  const pool = [...Array(ANIMALS.length).keys()];
  for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(rand()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }

  const laneH = 80 / playerCount;

  gamePlayers.forEach((p, i) => {
    const ai = pool[i % pool.length];
    const animal = ANIMALS[ai];
    const speedVar = 0.85 + rand() * 0.3;

    runners.push({
      id: p.id, name: p.name, animalIdx: ai, progress: 3,
      baseSpeed: BASE_SPEED * speedVar,
      skillCooldown: 4000 + rand() * 2000,
      nextSkill: 2000 + rand() * 2000,
      stunUntil: 0, boostUntil: 0, slowUntil: 0, shieldUntil: 0,
      finished: false, rank: 0, finishTime: 0,
    });

    const laneY = 20 + i * laneH + laneH / 2;
    const el = document.createElement('div');
    el.className = 'runner'; el.id = `runner-${p.id}`;
    el.style.top = `${laneY}%`; el.style.transform = 'translateY(-50%)';
    el.innerHTML = `
      <div class="runner-animal" id="animal-${p.id}">${animal.body(animal.color)}</div>
      <div class="runner-name">${animal.emoji} ${p.name}</div>
      <div class="runner-skill">${animal.skill.icon} ${animal.skill.name}</div>
    `;
    lanesEl.appendChild(el);

    if (i < playerCount - 1) {
      const lane = document.createElement('div');
      lane.className = 'lane'; lane.style.top = `${20 + (i+1) * laneH}%`;
      lanesEl.appendChild(lane);
    }
  });
}

function runCountdown(cb) {
  const el = document.getElementById('countdown');
  el.classList.add('active');
  let c = 3;
  function tick() {
    if (c > 0) { el.innerHTML = `<span class="cd-num">${c}</span>`; c--; setTimeout(tick, 900); }
    else { el.innerHTML = `<span class="cd-num" style="color:#facc15">GO!</span>`; setTimeout(() => { el.classList.remove('active'); cb(); }, 600); }
  }
  tick();
}

function executeSkill(r, elapsed) {
  const animal = ANIMALS[r.animalIdx];
  const skill = animal.skill;
  const others = runners.filter(x => x.id !== r.id && !x.finished);
  if (others.length === 0) return;

  showBanner(`${animal.emoji} ${r.name}의 ${skill.icon} ${skill.name}!`);
  showSkillPopup(r.id, `${skill.icon} ${skill.name}`);

  switch (skill.type) {
    case 'stun_one': {
      const sorted = [...others].sort((a,b) => b.progress - a.progress);
      const target = sorted[0];
      if (!target) break;
      if (target.shieldUntil > elapsed) { showSkillPopup(target.id, '🛡️ 방어!'); break; }
      target.stunUntil = elapsed + 2500;
      showSkillPopup(target.id, '😵 기절!');
      break;
    }
    case 'boost_self':
      r.boostUntil = elapsed + 3000;
      break;
    case 'teleport': {
      const oldProg = r.progress;
      r.progress = Math.min(r.progress + 5, FINISH_LINE - 1);
      spawnTeleportTrail(r.id, oldProg);
      break;
    }
    case 'shield':
      r.shieldUntil = elapsed + 1500;
      break;
    case 'slow_one': {
      const sorted = [...others].sort((a,b) => b.progress - a.progress);
      const target = sorted[0];
      if (!target) break;
      if (target.shieldUntil > elapsed) { showSkillPopup(target.id, '🛡️ 방어!'); break; }
      target.slowUntil = elapsed + 3000;
      showSkillPopup(target.id, '🌻 감속!');
      break;
    }
    case 'slow_all':
      others.forEach(t => {
        if (t.shieldUntil > elapsed) { showSkillPopup(t.id, '🛡️ 방어!'); return; }
        t.slowUntil = elapsed + 3000;
        showSkillPopup(t.id, '🧊 빙판!');
      });
      r.boostUntil = elapsed + 2000;
      break;
    case 'swap_ahead': {
      const ahead = others.filter(x => x.progress > r.progress).sort((a,b) => a.progress - b.progress);
      const target = ahead[0];
      if (target) {
        if (target.shieldUntil > elapsed) { showSkillPopup(target.id, '🛡️ 방어!'); break; }
        const tmp = r.progress; r.progress = target.progress; target.progress = tmp;
        showSkillPopup(target.id, '🔄 교환!');
        spawnTeleportTrail(r.id, tmp);
        spawnTeleportTrail(target.id, r.progress);
      }
      break;
    }
    case 'stun_top': {
      const sorted = [...others].sort((a,b) => b.progress - a.progress);
      sorted.slice(0, 2).forEach(t => {
        if (t.shieldUntil > elapsed) { showSkillPopup(t.id, '🛡️ 방어!'); return; }
        t.stunUntil = elapsed + 2500;
        showSkillPopup(t.id, '😵 기절!');
      });
      break;
    }
  }
}

let raceStart = 0, finishCount = 0, lastFrame = 0;

function startRace() {
  raceStart = performance.now(); lastFrame = raceStart; finishCount = 0;
  runners.forEach(r => document.getElementById(`runner-${r.id}`).classList.add('running'));
  requestAnimationFrame(raceLoop);
}

function raceLoop(now) {
  const elapsed = now - raceStart;
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;

  const remain = Math.max(0, RACE_DURATION - elapsed);
  document.getElementById('timerText').textContent = Math.ceil(remain / 1000) + 's';
  document.getElementById('timerFill').style.width = ((RACE_DURATION - remain) / RACE_DURATION * 100) + '%';

  let allFinished = true;

  runners.forEach(r => {
    if (r.finished) return;
    allFinished = false;

    const el = document.getElementById(`runner-${r.id}`);
    const isStunned = elapsed < r.stunUntil;
    const isBoosted = elapsed < r.boostUntil;
    const isSlowed = elapsed < r.slowUntil;
    const isShielded = elapsed < r.shieldUntil;

    el.classList.toggle('stunned', isStunned);
    el.classList.toggle('boosted', isBoosted && !isStunned);
    el.classList.toggle('shielded', isShielded);
    el.classList.toggle('running', !isStunned && !isBoosted);

    let stars = el.querySelector('.stun-stars');
    if (isStunned && !stars) {
      stars = document.createElement('div');
      stars.className = 'stun-stars'; stars.textContent = '⭐💫';
      el.querySelector('.runner-animal').appendChild(stars);
    } else if (!isStunned && stars) { stars.remove(); }

    if (elapsed > r.nextSkill && !isStunned) {
      executeSkill(r, elapsed);
      r.nextSkill = elapsed + r.skillCooldown + rand() * 2500;
    }

    if (!isStunned) {
      let mul = 1;
      if (isSlowed) mul *= 0.4;
      if (isBoosted) mul *= 2.5;
      r.progress += r.baseSpeed * mul * dt;
      if (Math.random() < 0.06) spawnDust(r.id, r.progress);
    }

    if (elapsed > RACE_DURATION && !isStunned) {
      r.progress += 5 * dt;
    }

    if (r.progress >= FINISH_LINE) {
      r.progress = FINISH_LINE;
      r.finished = true;
      r.finishTime = elapsed;
      finishCount++; r.rank = finishCount;
      el.className = 'runner finished';
      el.style.left = FINISH_LINE + '%';
      const badge = document.createElement('div');
      badge.className = 'rank-badge';
      badge.style.background = ['#facc15','#94a3b8','#cd7f32'][r.rank-1] || '#64748b';
      badge.textContent = r.rank;
      el.querySelector('.runner-animal').appendChild(badge);
      if (finishCount === runners.length) { el.className = 'runner loser'; }
      return;
    }

    el.style.left = r.progress + '%';
  });

  if (allFinished) { setTimeout(showResults, 1000); return; }
  requestAnimationFrame(raceLoop);
}

function showBanner(text) {
  const b = document.createElement('div');
  b.className = 'skill-banner'; b.textContent = text;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 2200);
}

function showSkillPopup(playerId, text) {
  const el = document.getElementById(`runner-${playerId}`);
  if (!el) return;
  const p = document.createElement('div');
  p.className = 'skill-popup'; p.textContent = text;
  p.style.left = el.style.left; p.style.top = el.style.top;
  document.getElementById('lanes').appendChild(p);
  setTimeout(() => p.remove(), 1500);
}

function spawnTeleportTrail(playerId, fromProgress) {
  const el = document.getElementById(`runner-${playerId}`);
  if (!el) return;
  for (let i = 0; i < 5; i++) {
    const t = document.createElement('div');
    t.className = 'teleport-trail';
    t.style.left = (fromProgress + i * 2) + '%'; t.style.top = el.style.top;
    document.getElementById('lanes').appendChild(t);
    setTimeout(() => t.remove(), 600);
  }
}

function spawnDust(playerId, progress) {
  const el = document.getElementById(`runner-${playerId}`);
  if (!el) return;
  const d = document.createElement('div');
  d.className = 'dust';
  d.style.left = (progress - 1) + '%'; d.style.top = el.style.top;
  d.style.width = d.style.height = (4 + Math.random()*5) + 'px';
  document.getElementById('lanes').appendChild(d);
  setTimeout(() => d.remove(), 600);
}

function showResults() {
  const sorted = [...runners].sort((a,b) => a.rank - b.rank);
  const loser = sorted[sorted.length - 1];

  sorted.forEach(r => GameSDK.submit(r.id, r.rank));

  const board = document.getElementById('resultBoard');
  board.innerHTML = '';
  const medals = ['🥇','🥈','🥉'];
  sorted.forEach((r, i) => {
    const animal = ANIMALS[r.animalIdx];
    const isLoser = r.id === loser.id;
    const row = document.createElement('div');
    row.className = 'result-row' + (isLoser ? ' loser-row' : '');
    row.innerHTML = `
      <div class="result-rank">${medals[i] || (i+1)}</div>
      <div class="result-animal">${animal.body(animal.color)}</div>
      <div class="result-name">${animal.emoji} ${r.name}</div>
      <div class="result-tag" style="background:${isLoser?'#f43f5e':'rgba(74,222,128,0.2)'}; color:${isLoser?'white':'#4ade80'}">
        ${isLoser ? '꽝! 결재 담당' : '세이프'}
      </div>
    `;
    board.appendChild(row);
  });

  document.getElementById('loserMsg').textContent = `${loser.name}님, 결재 상신 부탁드립니다 📋`;
  document.getElementById('resultOverlay').classList.add('active');
}
</script>
