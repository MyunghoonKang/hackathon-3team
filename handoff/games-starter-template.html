<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ⚠️ 필수 메타 태그 — 5개 전부 유지 -->
  <meta name="game:title" content="게임 제목을 여기에" />
  <meta name="game:min-players" content="2" />
  <meta name="game:max-players" content="8" />
  <meta name="game:description" content="한 줄 설명" />
  <meta name="game:compare" content="max" />
  <!-- compare: "max" 이면 값이 가장 큰 플레이어가 패자, "min" 이면 반대 -->

  <title>Game Starter</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: ui-sans-serif, system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    #root { display: grid; place-items: center; height: 100%; text-align: center; gap: 1rem; padding: 1rem; }
    .status { font-size: 0.85rem; opacity: 0.6; }
    .title { font-size: 1.5rem; font-weight: 700; }
    .action { padding: 0.75rem 1.5rem; font-size: 1rem; border-radius: 0.5rem; border: none; cursor: pointer; background: #22c55e; color: #0f172a; font-weight: 700; }
    .action:disabled { opacity: 0.4; cursor: not-allowed; }
    .loser { color: #f43f5e; font-size: 3rem; }
    .winner { color: #22c55e; font-size: 3rem; }
  </style>
</head>
<body>
  <div id="root">
    <div class="status" id="status">loading…</div>
    <div class="title" id="title">게임 스타터</div>
    <div id="stage"></div>
    <div id="result"></div>
  </div>

  <script>
    // ──────────────────────────────────────────────────────────
    // SDK 헬퍼: postMessage 계약을 캡슐화
    // ──────────────────────────────────────────────────────────
    const GameSDK = (() => {
      let me = null;
      let players = [];
      let sessionId = null;
      let seed = null;
      let submitted = false;
      const handlers = { init: null, start: null, outcome: null };

      function send(msg) {
        window.parent.postMessage(msg, '*');
      }

      function on(type, fn) { handlers[type] = fn; }

      window.addEventListener('message', (e) => {
        const msg = e.data;
        if (!msg || !msg.type) return;
        if (msg.type === 'init') {
          me = msg.playerId; players = msg.players; sessionId = msg.sessionId; seed = msg.seed;
          handlers.init?.({ me, players, sessionId, seed });
          send({ type: 'ready' });
        } else if (msg.type === 'start') {
          handlers.start?.();
        } else if (msg.type === 'outcome') {
          handlers.outcome?.({ loserId: msg.loserId, results: msg.results });
        }
      });

      function submit(value) {
        if (submitted) return;
        if (typeof value !== 'number' || Number.isNaN(value)) {
          console.error('submit(value): value must be a number', value);
          return;
        }
        submitted = true;
        send({ type: 'submit', value });
      }

      function prng() {
        // seed 기반 결정적 PRNG (mulberry32)
        let a = 0;
        if (seed) {
          for (let i = 0; i < seed.length; i++) a = (a * 31 + seed.charCodeAt(i)) | 0;
        } else {
          a = Date.now() | 0;
        }
        return function () {
          a |= 0; a = (a + 0x6D2B79F5) | 0;
          let t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      return { on, submit, prng, state: () => ({ me, players, sessionId, seed }) };
    })();

    // ──────────────────────────────────────────────────────────
    // 예시 게임: 1~100 사이 숫자 고르기, 정답과 거리 제출
    // compare=max (멀수록 패)
    // ──────────────────────────────────────────────────────────
    const statusEl = document.getElementById('status');
    const titleEl = document.getElementById('title');
    const stageEl = document.getElementById('stage');
    const resultEl = document.getElementById('result');

    let target = null;
    const rand = GameSDK.prng();

    GameSDK.on('init', ({ me, players }) => {
      statusEl.textContent = `you are ${me} of ${players.length}`;
      titleEl.textContent = '게임 스타터 — 수정해서 만드세요';
      stageEl.innerHTML = `
        <p>1 ~ 100 사이 숫자를 골라 제출. 정답에서 가장 멀리 고른 사람이 패배.</p>
        <input id="num" type="number" min="1" max="100" value="50" style="font-size:2rem;width:6rem;text-align:center;border-radius:0.5rem;padding:0.5rem">
        <div><button class="action" id="go">제출</button></div>
      `;
      target = Math.floor(rand() * 100) + 1;
    });

    GameSDK.on('start', () => {
      statusEl.textContent = 'START!';
    });

    GameSDK.on('outcome', ({ loserId, results }) => {
      const { me } = GameSDK.state();
      resultEl.innerHTML = me === loserId
        ? `<div class="loser">💀 YOU LOSE</div>`
        : `<div class="winner">🎉 SAFE</div>`;
      resultEl.innerHTML += `<div class="status">정답은 ${target}</div>`;
    });

    document.addEventListener('click', (e) => {
      if (e.target && e.target.id === 'go') {
        const input = document.getElementById('num');
        const guess = Number(input.value);
        if (!Number.isFinite(guess)) return;
        const distance = Math.abs(guess - target);
        statusEl.textContent = `제출 완료 (거리 ${distance}). 결과 대기 중…`;
        input.disabled = true;
        e.target.disabled = true;
        GameSDK.submit(distance);
      }
    });
  </script>
</body>
</html>
