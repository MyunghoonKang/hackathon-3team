<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Game Test Harness</title>
  <style>
    body { margin:0; font-family: ui-sans-serif, system-ui, sans-serif; background:#111; color:#eee; }
    header { padding: 0.75rem 1rem; background:#1e293b; display:flex; gap:0.5rem; align-items:center; flex-wrap: wrap; }
    header input { flex:1; min-width:16rem; padding:0.5rem; font-size:0.9rem; }
    header button { padding:0.5rem 1rem; border:0; background:#22c55e; color:#0f172a; font-weight:700; border-radius:0.25rem; cursor:pointer; }
    #grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:0.5rem; padding:0.5rem; }
    .cell { background:#0f172a; border-radius:0.5rem; overflow:hidden; position:relative; aspect-ratio:4/3; }
    .cell .label { position:absolute; top:4px; left:6px; font-size:0.75rem; background:rgba(0,0,0,0.4); padding:2px 6px; border-radius:4px; }
    .cell iframe { width:100%; height:100%; border:0; background:#0b1020; }
    #log { height: 18rem; overflow:auto; background:#000; color:#9ae6b4; font-family: ui-monospace, monospace; font-size:0.8rem; padding:0.5rem; white-space:pre-wrap; }
    .warn { color: #fbbf24; }
    .err  { color: #f87171; }
    .ok   { color: #34d399; }
  </style>
</head>
<body>
  <header>
    <label>게임 URL (상대 경로 OK): <input id="gameUrl" value="./your-game.html"></label>
    <label>플레이어 수: <input id="playerN" type="number" min="2" max="8" value="4" style="width:4rem"></label>
    <button id="loadBtn">로드</button>
    <button id="startBtn">START 신호</button>
    <button id="outcomeBtn">outcome 계산 + broadcast</button>
    <button id="resetBtn">리셋</button>
  </header>
  <div id="grid"></div>
  <pre id="log"></pre>
  <script>
    const grid = document.getElementById('grid');
    const logEl = document.getElementById('log');
    const state = { players: [], submitted: new Map(), compareMode: null, url: '', loaded: false };

    function log(msg, cls = '') {
      const ts = new Date().toISOString().slice(11, 23);
      logEl.innerHTML += `<span class="${cls}">[${ts}] ${msg}</span>\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function buildPlayers(n) {
      state.players = [];
      for (let i = 1; i <= n; i++) state.players.push({ id: `p${i}`, name: `Player${i}` });
    }

    async function inferCompareMode(url) {
      try {
        const html = await fetch(url).then(r => r.text());
        const m = html.match(/name=["']game:compare["']\s+content=["'](max|min)["']/i);
        if (!m) { log(`⚠ compare meta not found, defaulting to max`, 'warn'); return 'max'; }
        return m[1].toLowerCase();
      } catch (e) {
        log(`⚠ cannot fetch ${url} (open via http:// not file://). defaulting compare=max`, 'warn');
        return 'max';
      }
    }

    async function load() {
      const url = document.getElementById('gameUrl').value.trim();
      const n = Number(document.getElementById('playerN').value) || 4;
      if (!url) return;
      state.url = url;
      state.submitted.clear();
      buildPlayers(n);
      state.compareMode = await inferCompareMode(url);
      grid.innerHTML = '';
      grid.style.gridTemplateColumns = `repeat(${Math.min(n, 4)}, 1fr)`;
      const seed = Math.random().toString(36).slice(2, 10);
      const sessionId = 'test-' + seed;
      state.players.forEach(p => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.innerHTML = `<span class="label">${p.id} · ${p.name}</span><iframe sandbox="allow-scripts" src="${url}"></iframe>`;
        grid.appendChild(cell);
        const iframe = cell.querySelector('iframe');
        iframe.dataset.playerId = p.id;
        iframe.addEventListener('load', () => {
          iframe.contentWindow.postMessage({ type: 'init', playerId: p.id, players: state.players, sessionId, seed }, '*');
        });
      });
      state.loaded = true;
      log(`loaded ${n} iframes from ${url} · compare=${state.compareMode}`, 'ok');
    }

    function broadcast(msg) {
      document.querySelectorAll('iframe').forEach(f => f.contentWindow.postMessage(msg, '*'));
    }

    window.addEventListener('message', (e) => {
      const msg = e.data;
      if (!msg?.type) return;
      const iframe = [...document.querySelectorAll('iframe')].find(f => f.contentWindow === e.source);
      const pid = iframe?.dataset.playerId ?? '??';
      if (msg.type === 'ready') log(`${pid} → ready`, 'ok');
      else if (msg.type === 'submit') {
        if (state.submitted.has(pid)) { log(`${pid} → duplicate submit ignored (${msg.value})`, 'warn'); return; }
        if (typeof msg.value !== 'number' || !Number.isFinite(msg.value)) { log(`${pid} → INVALID submit ${JSON.stringify(msg.value)}`, 'err'); return; }
        state.submitted.set(pid, msg.value);
        log(`${pid} → submit ${msg.value}`, 'ok');
        if (state.submitted.size === state.players.length) log(`✓ all submitted (${state.submitted.size}/${state.players.length})`, 'ok');
      } else log(`${pid} → ${JSON.stringify(msg)}`);
    });

    document.getElementById('loadBtn').addEventListener('click', load);
    document.getElementById('startBtn').addEventListener('click', () => { if (!state.loaded) return; broadcast({ type: 'start' }); log('START broadcast', 'ok'); });
    document.getElementById('outcomeBtn').addEventListener('click', () => {
      if (state.submitted.size === 0) return log('no submissions yet', 'err');
      const results = [...state.submitted.entries()].map(([playerId, value]) => ({ playerId, value }));
      const pick = state.compareMode === 'min'
        ? results.reduce((a, b) => (a.value <= b.value ? a : b))
        : results.reduce((a, b) => (a.value >= b.value ? a : b));
      const tied = results.filter(r => r.value === pick.value);
      const loser = tied[Math.floor(Math.random() * tied.length)];
      broadcast({ type: 'outcome', loserId: loser.playerId, results });
      log(`loser = ${loser.playerId} (value ${loser.value}, compare=${state.compareMode}, tied=${tied.length})`, 'ok');
    });
    document.getElementById('resetBtn').addEventListener('click', () => { grid.innerHTML = ''; state.submitted.clear(); logEl.innerHTML = ''; state.loaded = false; });
  </script>
</body>
</html>
