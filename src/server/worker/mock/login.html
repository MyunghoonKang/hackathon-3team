<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>ERP Login (mock)</title>
  <style>
    body { font-family: Pretendard, sans-serif; background: #f5f5f5; padding: 40px; }
    form { max-width: 320px; margin: 60px auto; background: #fff; padding: 24px; border-radius: 8px; }
    input { width: 100%; padding: 8px; margin-bottom: 12px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #111; color: #fff; border: 0; cursor: pointer; }
    .row { display: flex; gap: 8px; margin-bottom: 12px; }
    .row > input { flex: 1; margin-bottom: 0; }
  </style>
</head>
<body>
  <!--
    ERP Exploration §로그인 폼 참조. 실 ERP 는 다음 2 단계:
      1) 회사코드(meissa) + 사번(userId) → [다음]
      2) 비밀번호(password) → [로그인]
    목업은 같은 페이지에서 password 영역을 display:none → block 으로 토글.
  -->
  <form id="loginForm">
    <div class="row">
      <input id="companyCode" name="companyCode" value="meissa" disabled>
    </div>
    <input id="userId" name="userId" placeholder="사번" autocomplete="off">
    <button id="nextBtn" type="button">다음</button>

    <div id="passwordStep" style="display:none; margin-top:16px;">
      <input id="password" name="password" type="password" placeholder="비밀번호">
      <button id="loginBtn" type="button">로그인</button>
      <div id="loginError" style="color:#c00; margin-top:8px; min-height:1em;"></div>
    </div>
  </form>

  <script>
    const nextBtn = document.getElementById('nextBtn');
    const passwordStep = document.getElementById('passwordStep');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    nextBtn.addEventListener('click', () => {
      const id = document.getElementById('userId').value.trim();
      if (!id) { loginError.textContent = '사번을 입력하세요.'; return; }
      loginError.textContent = '';
      passwordStep.style.display = 'block';
      document.getElementById('password').focus();
    });

    loginBtn.addEventListener('click', () => {
      const pw = document.getElementById('password').value;
      if (!pw) { loginError.textContent = '비밀번호를 입력하세요.'; return; }
      // B7 Playwright 단계에서 URL 이동 대신 postMessage 로 성공을 알릴 예정.
      // 목업 단계에서는 단순 location 이동.
      window.location.href = 'form.html';
    });
  </script>
</body>
</html>
